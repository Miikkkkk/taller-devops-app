version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_taller
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube_taller
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data

volumes:
  jenkins_data:
  sonarqube_data:
